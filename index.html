<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Days Quan hasn't mentioned his GF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      background: #fff;
      border: 3px solid #ccc;
      border-radius: 8px;
      padding: 48px 64px;
      text-align: center;
      max-width: 520px;
      width: 90vw;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    .label {
      font-size: 2.2rem;
      font-weight: 900;
      color: #111;
      line-height: 1.2;
      margin-bottom: 32px;
    }

    /* Slot-reel container — clips to show exactly one digit */
    .reel-wrap {
      display: inline-block;
      overflow: hidden;
      height: 1.05em;
      vertical-align: middle;
      line-height: 1;
    }

    .reel {
      display: flex;
      flex-direction: column;
      /* default: sitting on 0 */
      transform: translateY(0);
    }

    .digit {
      font-size: 9rem;
      font-weight: 900;
      color: #e00;
      line-height: 1;
      height: 1em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /*
      3 attempts, each more strained than the last.
      translateY(-100%) would fully show the "1".
      We get agonisingly close but always snap back.
    */
    @keyframes attempt1 {
      0%           { transform: translateY(0); }
      18%          { transform: translateY(-91%); }   /* SO close */
      28%          { transform: translateY(-94%); }   /* straining... */
      38%          { transform: translateY(-91%); }
      50%          { transform: translateY(4%); }     /* SNAP back, overshoot */
      62%          { transform: translateY(-2%); }
      70%          { transform: translateY(1%); }
      100%         { transform: translateY(0); }
    }

    @keyframes attempt2 {
      0%           { transform: translateY(0); }
      15%          { transform: translateY(-96%); }   /* EVEN closer */
      28%          { transform: translateY(-98%); }   /* trembling */
      32%          { transform: translateY(-96%); }
      42%          { transform: translateY(6%); }     /* SNAP, bigger overshoot */
      56%          { transform: translateY(-3%); }
      68%          { transform: translateY(1%); }
      100%         { transform: translateY(0); }
    }

    @keyframes attempt3 {
      0%           { transform: translateY(0); }
      12%          { transform: translateY(-99.5%); } /* SO CLOSE it hurts */
      22%          { transform: translateY(-99.8%); } /* basically there */
      28%          { transform: translateY(-99.5%); }
      36%          { transform: translateY(8%); }     /* catastrophic snap */
      50%          { transform: translateY(-4%); }
      62%          { transform: translateY(2%); }
      74%          { transform: translateY(-1%); }
      100%         { transform: translateY(0); }
    }

    .reel.go1 { animation: attempt1 0.9s cubic-bezier(.25,.1,.25,1) both; }
    .reel.go2 { animation: attempt2 1.0s cubic-bezier(.25,.1,.25,1) both; }
    .reel.go3 { animation: attempt3 1.2s cubic-bezier(.25,.1,.25,1) both; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Days Quan hasn't<br>mentioned his GF:</div>
    <div class="reel-wrap">
      <div class="reel" id="reel">
        <div class="digit">0</div>
        <div class="digit">1</div>
      </div>
    </div>
  </div>

  <script>
    const reel = document.getElementById('reel');

    function attempt(cls, delay, nextFn) {
      setTimeout(() => {
        reel.classList.remove('go1','go2','go3');
        void reel.offsetWidth;
        reel.classList.add(cls);
        reel.addEventListener('animationend', () => {
          reel.classList.remove(cls);
          if (nextFn) nextFn();
        }, { once: true });
      }, delay);
    }

    // Three increasingly desperate attempts, then give up
    attempt('go1', 600, () =>
      attempt('go2', 700, () =>
        attempt('go3', 800, null)
      )
    );
  </script>
</body>
</html>
