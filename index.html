<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Days Quan hasn't mentioned his GF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .card {
      background: #fff;
      border: 3px solid #ccc;
      border-radius: 8px;
      padding: 48px 64px;
      text-align: center;
      max-width: 520px;
      width: 90vw;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    .label {
      font-size: 2.2rem;
      font-weight: 900;
      color: #111;
      line-height: 1.2;
      margin-bottom: 32px;
    }

    .reel-wrap {
      display: inline-block;
      overflow: hidden;
      font-size: 9rem;
      height: 1.05em;
      vertical-align: middle;
      line-height: 1;
    }

    .reel {
      display: flex;
      flex-direction: column;
      transform: translateY(0);
    }

    .digit {
      font-size: inherit;
      font-weight: 900;
      color: #e00;
      line-height: 1;
      height: 1em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes attempt1 {
      0%   { transform: translateY(0); }
      18%  { transform: translateY(-91%); }
      28%  { transform: translateY(-94%); }
      38%  { transform: translateY(-91%); }
      50%  { transform: translateY(4%); }
      62%  { transform: translateY(-2%); }
      70%  { transform: translateY(1%); }
      100% { transform: translateY(0); }
    }

    @keyframes attempt2 {
      0%   { transform: translateY(0); }
      15%  { transform: translateY(-96%); }
      28%  { transform: translateY(-98%); }
      32%  { transform: translateY(-96%); }
      42%  { transform: translateY(6%); }
      56%  { transform: translateY(-3%); }
      68%  { transform: translateY(1%); }
      100% { transform: translateY(0); }
    }

    @keyframes attempt3 {
      0%   { transform: translateY(0); }
      22%  { transform: translateY(-100%); }
      48%  { transform: translateY(-100%); }
      60%  { transform: translateY(12%); }
      72%  { transform: translateY(-6%); }
      82%  { transform: translateY(3%); }
      91%  { transform: translateY(-1%); }
      100% { transform: translateY(0); }
    }

    .reel.go1 { animation: attempt1 0.9s cubic-bezier(.25,.1,.25,1) both; }
    .reel.go2 { animation: attempt2 1.0s cubic-bezier(.25,.1,.25,1) both; }
    .reel.go3 { animation: attempt3 1.8s cubic-bezier(.25,.1,.25,1) both; }

    /* Floating emoji particles */
    .emoji-particle {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      user-select: none;
      animation: floatUp var(--dur) ease-out forwards;
      font-size: var(--size);
      left: var(--x);
      top: var(--y);
      transform-origin: center;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(var(--scale)); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Days Quan hasn't<br>mentioned his GF:</div>
    <div class="reel-wrap">
      <div class="reel" id="reel">
        <div class="digit">0</div>
        <div class="digit">1</div>
      </div>
    </div>
  </div>

  <script>
    const reel = document.getElementById('reel');

    function attempt(cls, delay, nextFn) {
      setTimeout(() => {
        reel.classList.remove('go1','go2','go3');
        void reel.offsetWidth;
        reel.classList.add(cls);
        reel.addEventListener('animationend', () => {
          reel.classList.remove(cls);
          if (nextFn) nextFn();
        }, { once: true });
      }, delay);
    }

    attempt('go1', 600, () =>
      attempt('go2', 700, () =>
        attempt('go3', 800, floodEmojis)
      )
    );

    function floodEmojis() {
      const EMOJIS = ['🎆','🎇','✨','⭐','🌟','💥','🎉','🎊','🌠','💫','🔥','🥳','👏','🎈','🪅'];
      const TOTAL  = 120;
      const W = window.innerWidth;
      const H = window.innerHeight;

      for (let i = 0; i < TOTAL; i++) {
        setTimeout(() => {
          const el = document.createElement('span');
          el.className = 'emoji-particle';
          el.textContent = EMOJIS[Math.random() * EMOJIS.length | 0];

          const startX = Math.random() * W;
          const startY = Math.random() * H;
          const dx     = (Math.random() - 0.5) * 300;
          const dy     = -100 - Math.random() * 400;
          const rot    = (Math.random() - 0.5) * 720;
          const dur    = 1.2 + Math.random() * 1.8;
          const size   = 1.5 + Math.random() * 3;
          const scale  = 0.2 + Math.random() * 1.2;

          el.style.cssText = `
            --x: ${startX}px; --y: ${startY}px;
            --dx: ${dx}px;    --dy: ${dy}px;
            --rot: ${rot}deg; --dur: ${dur}s;
            --size: ${size}rem; --scale: ${scale};
          `;

          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }, Math.random() * 1200);
      }
    }
  </script>
</body>
</html>
