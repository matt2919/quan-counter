<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Days Quan hasn't mentioned his GF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      background: #fff;
      border: 3px solid #ccc;
      border-radius: 8px;
      padding: 48px 64px;
      text-align: center;
      max-width: 520px;
      width: 90vw;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    .label {
      font-size: 2.2rem;
      font-weight: 900;
      color: #111;
      line-height: 1.2;
      margin-bottom: 32px;
    }

    .counter {
      font-size: 9rem;
      font-weight: 900;
      color: #e00;
      line-height: 1;
      display: inline-block;
      min-width: 3ch;
      transition: transform 0.05s;
      will-change: transform;
    }

    .counter.shake {
      animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }

    .counter.crash {
      animation: crash 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes shake {
      10%, 90% { transform: translateX(-4px) rotate(-1deg); }
      20%, 80% { transform: translateX(8px) rotate(1deg); }
      30%, 50%, 70% { transform: translateX(-8px) rotate(-1deg); }
      40%, 60% { transform: translateX(8px) rotate(1deg); }
    }

    @keyframes crash {
      0%   { transform: scale(4) translateY(-40px); opacity: 0; color: #ff0; text-shadow: 0 0 40px #f00; }
      40%  { transform: scale(1.3) translateY(0); opacity: 1; color: #e00; text-shadow: 0 0 20px #f00; }
      60%  { transform: scale(0.9); }
      80%  { transform: scale(1.05); }
      100% { transform: scale(1); color: #e00; text-shadow: none; }
    }

    @keyframes flash-bg {
      0%   { background: #fff; }
      15%  { background: #ffe0e0; }
      35%  { background: #fff0f0; }
      100% { background: #fff; }
    }

    .card.flash {
      animation: flash-bg 0.8s ease both;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="label">Days Quan hasn't<br>mentioned his GF:</div>
    <div class="counter" id="counter">0</div>
  </div>

  <script>
    const el = document.getElementById('counter');
    const card = document.getElementById('card');

    function setNum(n) { el.textContent = n; }

    function runDrama() {
      // Phase 1: rapid-fire chaos — fly through random big numbers
      const chaos = [347, 12, 891, 56, 1204, 3, 999, 421, 77, 650, 2, 888, 11];
      let i = 0;
      const chaosInterval = setInterval(() => {
        el.classList.add('shake');
        setNum(chaos[i % chaos.length]);
        setTimeout(() => el.classList.remove('shake'), 80);
        i++;
        if (i >= chaos.length) {
          clearInterval(chaosInterval);
          // Phase 2: dramatic countdown 5..4..3..2..1..0
          countdown();
        }
      }, 80);
    }

    function countdown() {
      let n = 5;
      setNum(n);
      const cd = setInterval(() => {
        n--;
        setNum(n);
        el.style.transform = 'scale(1.15)';
        setTimeout(() => el.style.transform = '', 120);
        if (n <= 0) {
          clearInterval(cd);
          // Phase 3: crash landing on 0
          setTimeout(crashLand, 200);
        }
      }, 300);
    }

    function crashLand() {
      setNum(0);
      el.classList.remove('shake');
      void el.offsetWidth; // reflow
      el.classList.add('crash');
      card.classList.add('flash');
      el.addEventListener('animationend', () => {
        el.classList.remove('crash');
        card.classList.remove('flash');
      }, { once: true });
    }

    // Small delay so the page renders before the show starts
    setTimeout(runDrama, 400);
  </script>
</body>
</html>
