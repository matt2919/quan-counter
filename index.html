<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Days Quan hasn't mentioned his GF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .card {
      background: #fff;
      border: 3px solid #ccc;
      border-radius: 8px;
      padding: 48px 64px;
      text-align: center;
      max-width: 520px;
      width: 90vw;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    .label {
      font-size: 2.2rem;
      font-weight: 900;
      color: #111;
      line-height: 1.2;
      margin-bottom: 32px;
    }

    .reel-wrap {
      display: inline-block;
      overflow: hidden;
      font-size: 9rem;
      height: 1.05em;
      vertical-align: middle;
      line-height: 1;
    }

    .reel {
      display: flex;
      flex-direction: column;
      transform: translateY(0);
    }

    .digit {
      font-size: inherit;
      font-weight: 900;
      color: #e00;
      line-height: 1;
      height: 1em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /*
      The reel has 2 digits each 1em tall → total height = 2em.
      translateY(-50%) moves it up by exactly 1em → shows "1".
      So "X% of the way to 1" = translateY(-X% * 0.5).
    */
    @keyframes attempt1 {
      0%   { transform: translateY(0); }
      18%  { transform: translateY(-45.5%); }  /* 91% of the way */
      28%  { transform: translateY(-47%); }
      38%  { transform: translateY(-45.5%); }
      50%  { transform: translateY(2%); }
      62%  { transform: translateY(-1%); }
      70%  { transform: translateY(0.5%); }
      100% { transform: translateY(0); }
    }

    @keyframes attempt2 {
      0%   { transform: translateY(0); }
      15%  { transform: translateY(-48%); }    /* 96% of the way */
      28%  { transform: translateY(-49%); }    /* 98% */
      32%  { transform: translateY(-48%); }
      42%  { transform: translateY(3%); }
      56%  { transform: translateY(-1.5%); }
      68%  { transform: translateY(0.5%); }
      100% { transform: translateY(0); }
    }

    @keyframes attempt3 {
      0%   { transform: translateY(0); }
      22%  { transform: translateY(-50%); }    /* lands on 1 */
      48%  { transform: translateY(-50%); }    /* holds at 1 */
      60%  { transform: translateY(6%); }      /* SNAP — overshoots past 0 */
      72%  { transform: translateY(-3%); }
      82%  { transform: translateY(1.5%); }
      91%  { transform: translateY(-0.5%); }
      100% { transform: translateY(0); }
    }

    .reel.go1 { animation: attempt1 0.9s cubic-bezier(.25,.1,.25,1) both; }
    .reel.go2 { animation: attempt2 1.0s cubic-bezier(.25,.1,.25,1) both; }
    .reel.go3 { animation: attempt3 1.8s cubic-bezier(.25,.1,.25,1) both; }

    /* ── Impact effects ── */
    @keyframes cardShake {
      0%   { transform: translate(0, 0) rotate(0deg); }
      12%  { transform: translate(-10px, -5px) rotate(-1.5deg); }
      24%  { transform: translate(10px, 5px) rotate(1.5deg); }
      36%  { transform: translate(-7px, 2px) rotate(-0.8deg); }
      48%  { transform: translate(5px, -2px) rotate(0.5deg); }
      64%  { transform: translate(-3px, 1px); }
      80%  { transform: translate(1px, 0); }
      100% { transform: translate(0, 0); }
    }

    @keyframes cardFlash {
      0%   { background: #fff; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
      10%  { background: #ffdddd; box-shadow: 0 0 80px 30px rgba(220,0,0,0.45); }
      30%  { background: #fff3f3; box-shadow: 0 0 40px 15px rgba(220,0,0,0.2); }
      100% { background: #fff;    box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
    }

    @keyframes digitThud {
      0%   { transform: scale(1); }
      15%  { transform: scale(1.55); }
      35%  { transform: scale(0.88); }
      55%  { transform: scale(1.12); }
      75%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .card.impact {
      animation: cardShake 0.55s ease-out both, cardFlash 0.7s ease-out both;
    }

    .reel-wrap.thud {
      animation: digitThud 0.55s cubic-bezier(.36,.07,.19,.97) both;
    }

    /* ── "fuck you quan" slam-in ── */
    .fyq {
      font-size: 1.4rem;
      font-weight: 900;
      color: #111;
      margin-top: 28px;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: scale(3);
    }

    @keyframes textSlam {
      0%   { opacity: 0; transform: scale(3.5);   color: #e00; }
      18%  { opacity: 1; transform: scale(0.85);  color: #e00; }
      32%  { transform: scale(1.12); }
      48%  { transform: scale(0.95); }
      62%  { transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1);     color: #111; }
    }

    .fyq.slam {
      animation: textSlam 0.6s cubic-bezier(.22,1,.36,1) forwards;
    }

    /* ── Emoji particles ── */
    .emoji-particle {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      user-select: none;
      animation: floatUp var(--dur) ease-out forwards;
      font-size: var(--size);
      left: var(--x);
      top: var(--y);
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(var(--scale)); }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="label">Days Quan hasn't<br>mentioned his GF:</div>
    <div class="reel-wrap" id="reelWrap">
      <div class="reel" id="reel">
        <div class="digit">0</div>
        <div class="digit">1</div>
      </div>
    </div>
    <div class="fyq" id="fyq">fuck you quan</div>
  </div>

  <script>
    const reel     = document.getElementById('reel');
    const reelWrap = document.getElementById('reelWrap');
    const card     = document.getElementById('card');
    const fyq      = document.getElementById('fyq');
    const MESSAGES = ['Fuck you Quan', 'Quan gets pegged lmao', 'Quan is 27','#RapeQuan','Did you know that Quan can legally touch kids and is very anal with them?'];
    fyq.textContent = MESSAGES[Math.random() * MESSAGES.length | 0];

    function attempt(cls, delay, nextFn, impactDelay) {
      setTimeout(() => {
        reel.classList.remove('go1','go2','go3');
        void reel.offsetWidth;
        reel.classList.add(cls);

        if (impactDelay != null) {
          setTimeout(triggerImpact, impactDelay);
        }

        reel.addEventListener('animationend', () => {
          reel.classList.remove(cls);
          if (nextFn) nextFn();
        }, { once: true });
      }, delay);
    }

    function triggerImpact() {
      // shake + flash card
      card.classList.remove('impact');
      void card.offsetWidth;
      card.classList.add('impact');
      card.addEventListener('animationend', () => card.classList.remove('impact'), { once: true });

      // thud the digit
      reelWrap.classList.remove('thud');
      void reelWrap.offsetWidth;
      reelWrap.classList.add('thud');
      reelWrap.addEventListener('animationend', () => reelWrap.classList.remove('thud'), { once: true });

      // slam in the text slightly after the counter thud
      setTimeout(() => {
        fyq.classList.add('slam');
      }, 180);

      // flood emojis
      floodEmojis();
    }

    // attempt3 is 1.8s; snap-back hits at 60% = 1080ms
    attempt('go1', 600, () =>
      attempt('go2', 700, () =>
        attempt('go3', 800, null, 1080)
      )
    );

    function floodEmojis() {
      const EMOJIS = ['🎆','🎇','✨','⭐','🌟','💥','🎉','🎊','🌠','💫','🔥','🥳','👏','🎈','🪅'];
      const W = window.innerWidth;
      const H = window.innerHeight;

      for (let i = 0; i < 120; i++) {
        setTimeout(() => {
          const el = document.createElement('span');
          el.className = 'emoji-particle';
          el.textContent = EMOJIS[Math.random() * EMOJIS.length | 0];

          el.style.cssText = `
            --x:     ${Math.random() * W}px;
            --y:     ${Math.random() * H}px;
            --dx:    ${(Math.random() - 0.5) * 300}px;
            --dy:    ${-100 - Math.random() * 400}px;
            --rot:   ${(Math.random() - 0.5) * 720}deg;
            --dur:   ${1.2 + Math.random() * 1.8}s;
            --size:  ${1.5 + Math.random() * 3}rem;
            --scale: ${0.2 + Math.random() * 1.2};
          `;

          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }, Math.random() * 1200);
      }
    }
  </script>
</body>
</html>
